<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montoro Abogados - Ronda</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importamos fuentes elegantes de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <section class="hero">
        <div class="overlay">
            <div class="container">
                
                <!-- Logotipo -->
                <header class="logo">
                    <div class="icon">M</div>
                    <div class="brand-text">
                        <h1>MONTORO</h1>
                        <span>ABOGA2</span>
                    </div>
                </header>

                <!-- Contenido Principal -->
                <main class="hero-content">
                    <h2 class="main-title">
                        Asesoramiento jurídico <span class="highlight">claro</span> para proteger sus intereses
                    </h2>
                    
                    <div class="divider"></div>

                    <p class="subtitle">
                        LE ACOMPAÑAMOS CON CRITERIO, DISCRECIÓN Y UNA ESTRATEGIA AJUSTADA A SU CASO.
                    </p>

                    <footer class="location">
                        <span class="pin">#</span>· BUFETE DE ABOGADOS EN RONDA ·
                    </footer>
                </main>

            </div>
        </div>
    </section>

</body>
</html>
